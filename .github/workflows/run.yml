name: AutoFetch
on:
  workflow_dispatch: # 手动运行按钮
  schedule:
    - cron: '0 */12 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 关键：开启仓库写入权限，解决push失败exit1
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ubuntu自带chrome，无需手动安装
      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行爬虫
        run: python fetch.py

      - name: 提交更新文件
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "bot@github.com"
          git add result.txt error.log
          # 无修改直接跳过commit，避免空提交报错
          git commit -m "auto update $(date +%Y-%m-%d_%H:%M)" || exit 0
          git push
