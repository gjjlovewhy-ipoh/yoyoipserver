name: AutoFetch
# 触发规则：1.定时自动跑  2.提交代码时手动触发
on:
  schedule:
    - cron: '0 */12 * * *' # 每12小时自动抓取一次，可自定义 cron
  workflow_dispatch: # 支持在Github页面手动点按钮运行

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装chrome+驱动(云端预装，无需本地)
        run: |
          sudo apt update
          sudo apt install -y chromium-browser chromium-chromedriver
          export PATH=$PATH:/usr/lib/chromium-browser/

      - name: 安装python依赖
        run: pip install -r requirements.txt

      - name: 执行爬虫
        run: python fetch.py

      - name: 自动提交更新后的txt到仓库
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@github.com"
          git add result.txt error.log
          git commit -m "auto update result $(date +%Y-%m-%d_%H:%M)" || true
          git push
